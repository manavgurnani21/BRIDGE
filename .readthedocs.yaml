version: 2
build:
  os: ubuntu-20.04
  tools:
    python: "3.10"
sphinx:
  configuration: docs/conf.py

python:
  install:
    - packages:
        - sphinx-book-theme
        - myst-nb
        - sphinx-autodoc-typehints
        - sphinxcontrib-bibtex
        - sphinx-copybutton
        - sphinx-design
        - sphinxext-opengraph
        - sphinx-hoverxref