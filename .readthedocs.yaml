version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.10"
  jobs:
    install:
      - python -m pip install --upgrade pip
      - python -m pip install
        sphinx-book-theme
        myst-nb
        sphinx-autodoc-typehints
        sphinxcontrib-bibtex
        sphinx-copybutton
        sphinx-design
        sphinxext-opengraph
        sphinx-hoverxref

sphinx:
  configuration: docs/conf.py
