name: BRIDGE-CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Remove old Docker cache
        run: |
          docker builder prune -af || true

      - name: Maximize build space
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/hostedtoolcache
          df -h

      # checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup docker buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build image
      - name: Build BRIDGE Docker image (CPU)
        run: |
          docker build --no-cache -f Dockerfile.cpu -t bridge_image:cpu .

      # Run CI tests inside container
      - name: Run tests inside BRIDGE container
        run: |
          docker run --rm bridge_image:cpu \
             conda run -n BRIDGE python -c "print('CI OK: ENV LOADED')"

      # Run main.py
      - name: Run main.py smoke test
        run: |
          docker run --rm bridge_image:cpu \
            conda run -n BRIDGE python main.py \
                --train \
                --data_path ./dataset \
                --data_file AUH_HepG2_small \
                --use_cpu \
                --Transformer_path ./RBPformer \
                --model_save_path ./results/model \
                --early_stopping 1 \
                --lr 0.001
                